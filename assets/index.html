<!DOCTYPE html>
<html>
<body style="background:#1e1e1e;color:white;text-align:center;margin-top:100px;">

<h1>New Tab</h1>

<input id="q" placeholder="検索..." />
<button onclick="search()">検索</button>

<button onclick="newTab()">＋ タブ</button>

<script>
function search() {
    let q = document.getElementById("q").value;
    location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
}

function newTab() {
    window.ipc.postMessage("new_tab");
}
</script>

</body>
</html>
