<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
    margin-top: 100px;
}
input, select, button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>Frisk Browser</h1>

<select id="engine">
    <option value="google">Google</option>
    <option value="bing">Bing</option>
    <option value="yahoo">Yahoo Japan</option>
    <option value="duck">DuckDuckGo</option>
    <option value="wiki">Wikipedia</option>
    <option value="github">GitHub</option>
</select>

<br>

<input id="q" placeholder="検索 or URL">
<button onclick="go()">検索</button>
<button onclick="newTab()">＋タブ</button>

<script>
function go() {
    let q = document.getElementById("q").value;
    let e = document.getElementById("engine").value;

    let map = {
        google: `https://www.google.com/search?q=${q}`,
        bing: `https://www.bing.com/search?q=${q}`,
        yahoo: `https://search.yahoo.co.jp/search?p=${q}`,
        duck: `https://duckduckgo.com/?q=${q}`,
        wiki: `https://ja.wikipedia.org/wiki/${q}`,
        github: `https://github.com/search?q=${q}`
    };

    window.ipc.postMessage(JSON.stringify({
        cmd: "navigate",
        url: map[e]
    }));
}

function newTab() {
    window.ipc.postMessage(JSON.stringify({
        cmd: "new_tab"
    }));
}
</script>

</body>
</html>
